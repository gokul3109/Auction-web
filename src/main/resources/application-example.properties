# ============================================================
# application-example.properties
# Copy this file to application.properties and fill in values.
# application.properties is gitignored — never commit real credentials.
# ============================================================

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Name
spring.application.name=Auction Web API

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Database Configuration - Supabase PostgreSQL
spring.datasource.url=jdbc:postgresql://db.<YOUR_SUPABASE_PROJECT_ID>.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=YOUR_SUPABASE_DB_PASSWORD

# PostgreSQL Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase Service Role Key (reserved for future use)
# supabase.project-url=https://<YOUR_SUPABASE_PROJECT_ID>.supabase.co
# supabase.service-role-key=YOUR_SUPABASE_SERVICE_ROLE_KEY

# JWT Configuration
# Generate a Base64-encoded random string (at least 32 bytes decoded)
jwt.secret=YOUR_BASE64_ENCODED_JWT_SECRET
# Token expiry: 24 hours in milliseconds
jwt.expiration=86400000

# Google OAuth
google.client-id=YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com

# Logging
logging.level.root=INFO
logging.level.com.auctionweb=DEBUG
